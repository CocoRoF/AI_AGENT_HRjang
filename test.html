<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  body {
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    color: #111;
  }

  .container {
    width: 640px;
    padding: 32px 20px;
  }

  /* 개발자 입력 */
  .dev-section {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 12px;
  }
  .dev-item {
    border: 2px solid #1E88E5;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    color: #1E88E5;
    text-align: center;
    min-width: 80px;
  }

  /* 화살표 */
  .arrow {
    text-align: center;
    font-size: 22px;
    margin: 8px 0;
  }

  /* create_agent */
  .create-agent-box {
    border: 2.5px solid #1E88E5;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 12px;
  }
  .create-agent-title {
    text-align: center;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  /* LangGraph 내부 */
  .langgraph-inner {
    border: 2px dashed #1E88E5;
    border-radius: 8px;
    padding: 14px;
    text-align: center;
  }
  .langgraph-label {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .langgraph-items {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .langgraph-item {
    border: 1.5px solid #1E88E5;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
  }
  .auto-label {
    margin-top: 6px;
    font-size: 12px;
    color: #555;
    font-style: italic;
  }

  /* 출력 */
  .output-box {
    border: 2.5px solid #111;
    border-radius: 12px;
    padding: 14px 18px;
    text-align: center;
  }
  .output-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .output-desc {
    font-size: 13px;
    color: #333;
  }

  /* 범례 */
  .legend {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 20px;
    font-size: 12px;
    color: #444;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-box {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 2px solid;
  }
  .blue { border-color: #1E88E5; }
  .black { border-color: #111; }
</style>
</head>
<body>
<div class="container">

  <!-- 개발자 입력 -->
  <div class="dev-section">
    <div class="dev-item">🧠 LLM</div>
    <div class="dev-item">🔧 Tools</div>
    <div class="dev-item">📝 Prompt</div>
  </div>

  <div class="arrow">↓</div>

  <!-- create_agent -->
  <div class="create-agent-box">
    <div class="create-agent-title">create_agent()</div>

    <div class="langgraph-inner">
      <div class="langgraph-label">LangGraph</div>
      <div class="langgraph-items">
        <div class="langgraph-item">노드 구성</div>
        <div class="langgraph-item">엣지 연결</div>
        <div class="langgraph-item">상태 관리</div>
        <div class="langgraph-item">실행 흐름</div>
      </div>
      <div class="auto-label">create_agent가 자동으로 처리하는 영역</div>
    </div>
  </div>

  <div class="arrow">↓</div>

  <!-- 출력 -->
  <div class="output-box">
    <div class="output-title">CompiledStateGraph</div>
    <div class="output-desc">invoke()로 실행되는 에이전트 객체</div>
  </div>

</div>
</body>
</html>
